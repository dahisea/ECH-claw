name: ECH Deployment Probe

on:
  workflow_dispatch:
    inputs:
      domains:
        description: "域名列表（逗号分隔，或留空使用内置样本）"
        required: false
        default: "v2ex.com,meta.com"
      concurrency:
        description: "并发探测数量"
        required: false
        default: "20"
      timeout:
        description: "每个域名超时（秒）"
        required: false
        default: "5"
  schedule:
    # 每天 UTC 02:00 自动运行
    - cron: "0 2 * * *"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: 构建 OpenSSL ECH 分支（带缓存）
  # ─────────────────────────────────────────────
  build-openssl:
    name: Build OpenSSL (feature/ech)
    runs-on: ubuntu-22.04
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}

    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4

      # 用 OpenSSL 源码的最新 commit hash 作为缓存键，避免重复编译
      - name: 获取 OpenSSL ECH 分支最新 commit
        id: ech-rev
        run: |
          REV=$(git ls-remote https://github.com/openssl/openssl.git refs/heads/feature/ech | cut -f1)
          echo "rev=$REV" >> $GITHUB_OUTPUT

      - name: 恢复 OpenSSL 编译缓存
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/openssl-ech
          key: openssl-ech-${{ steps.ech-rev.outputs.rev }}-ubuntu22

      - name: 安装编译依赖
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git perl libssl-dev

      - name: 克隆 OpenSSL feature/ech
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 --branch feature/ech \
            https://github.com/openssl/openssl.git ~/openssl-src

      - name: 编译 OpenSSL
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd ~/openssl-src
          ./Configure --prefix=$HOME/openssl-ech --openssldir=$HOME/openssl-ech \
            no-shared linux-x86_64
          make -j$(nproc)
          make install_sw

      # 修复：原来有两个 actions/cache@v4 步骤使用相同的 key。
      # actions/cache@v4 在 cache miss 时会在 job 结束后自动保存，
      # 重复的显式 save 步骤是多余的，应改用 actions/cache/save@v4。
      - name: 显式保存编译产物到缓存
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/openssl-ech
          key: openssl-ech-${{ steps.ech-rev.outputs.rev }}-ubuntu22

  # ─────────────────────────────────────────────
  # Job 2: 探测 ECH
  # ─────────────────────────────────────────────
  probe:
    name: Probe ECH Deployments
    runs-on: ubuntu-22.04
    needs: build-openssl

    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4

      - name: 获取 OpenSSL ECH 分支最新 commit（复用缓存键）
        id: ech-rev
        run: |
          REV=$(git ls-remote https://github.com/openssl/openssl.git refs/heads/feature/ech | cut -f1)
          echo "rev=$REV" >> $GITHUB_OUTPUT

      - name: 恢复 OpenSSL 编译缓存
        uses: actions/cache@v4
        with:
          path: ~/openssl-ech
          key: openssl-ech-${{ steps.ech-rev.outputs.rev }}-ubuntu22

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install aiofiles dnspython

      - name: 准备域名列表
        run: |
          if [ -n "${{ github.event.inputs.domains }}" ]; then
            # 用户手动输入，逗号分隔转换为每行一个
            echo "${{ github.event.inputs.domains }}" \
              | tr ',' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | grep -v '^$' > domains.txt
          else
            # 使用内置样本（包含已知 ECH 部署和普通域名对比）
            cat <<'EOF' > domains.txt
          cloudflare.com
          blog.cloudflare.com
          dash.cloudflare.com
          facebook.com
          instagram.com
          whatsapp.com
          messenger.com
          google.com
          github.com
          example.com
          tls-ech.dev
          defo.ie
          EOF
          fi
          echo "待探测域名数量: $(wc -l < domains.txt)"
          cat domains.txt

      - name: 执行 ECH 探测
        run: |
          python scripts/probe_ech.py \
            --domains domains.txt \
            --openssl ~/openssl-ech/bin/openssl \
            --concurrency ${{ github.event.inputs.concurrency || '20' }} \
            --timeout ${{ github.event.inputs.timeout || '5' }} \
            --output results/

      - name: 上传探测结果
        uses: actions/upload-artifact@v4
        with:
          name: ech-probe-results-${{ github.run_id }}
          path: results/
          retention-days: 30

      - name: 打印结果摘要
        run: |
          if [ -f results/summary.txt ]; then
            cat results/summary.txt
          fi
          # 写入 GitHub Actions Job Summary
          echo "## ECH 探测结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/summary.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat results/summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "详细结果见 Artifacts: \`ech-probe-results-${{ github.run_id }}\`" \
            >> $GITHUB_STEP_SUMMARY
