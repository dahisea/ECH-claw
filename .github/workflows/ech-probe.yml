name: ECH Deployment Probe

# 修复说明（yml）：
#   1. 去掉缓存：将 build-openssl 与 probe 合并为单个 job，
#      消除两 job 间通过 actions/cache 传递产物的复杂性与不稳定性。
#   2. 修正脚本路径：原来 `python scripts/probe_ech.py` 路径不存在，
#      改为 `python probe_ech.py`（文件位于仓库根目录）。
#   3. 移除无用依赖：`aiofiles` 和 `dnspython` 在代码中从未使用，
#      pip install 步骤已删除，节省约 10–15s 安装时间。
#   4. 默认域名列表新增 v2ex.com、meta.com；github.com 原已存在。

on:
  workflow_dispatch:
    inputs:
      domains:
        description: "域名列表（逗号分隔，或留空使用内置样本）"
        required: false
        default: ""
      concurrency:
        description: "并发探测数量"
        required: false
        default: "20"
      timeout:
        description: "每个域名超时（秒）"
        required: false
        default: "5"
  schedule:
    # 每天 UTC 02:00 自动运行
    - cron: "0 2 * * *"

jobs:
  # 修复 1：合并为单 job，彻底去掉缓存，编译完直接探测
  probe:
    name: Build OpenSSL & Probe ECH
    runs-on: ubuntu-22.04

    steps:
      - name: 检出本仓库
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git perl libssl-dev

      - name: 克隆 OpenSSL feature/ech 并编译
        run: |
          git clone --depth=1 --branch feature/ech \
            https://github.com/openssl/openssl.git ~/openssl-src
          cd ~/openssl-src
          ./Configure --prefix=$HOME/openssl-ech --openssldir=$HOME/openssl-ech \
            no-shared linux-x86_64
          make -j$(nproc)
          make install_sw

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 修复 3：移除从未使用的 aiofiles / dnspython
      # （probe_ech.py 仅用标准库，无需额外安装）

      - name: 准备域名列表
        run: |
          if [ -n "${{ github.event.inputs.domains }}" ]; then
            # 用户手动输入，逗号分隔转换为每行一个
            echo "${{ github.event.inputs.domains }}" \
              | tr ',' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | grep -v '^$' > domains.txt
          else
            # 修复 4：内置样本新增 v2ex.com、meta.com；github.com 原已存在
            cat <<'EOF' > domains.txt
          cloudflare.com
          blog.cloudflare.com
          dash.cloudflare.com
          facebook.com
          instagram.com
          whatsapp.com
          messenger.com
          meta.com
          google.com
          github.com
          v2ex.com
          example.com
          tls-ech.dev
          defo.ie
          EOF
          fi
          echo "待探测域名数量: $(wc -l < domains.txt)"
          cat domains.txt

      # 修复 2：脚本路径由 scripts/probe_ech.py 改为 probe_ech.py
      - name: 执行 ECH 探测
        run: |
          python probe_ech.py \
            --domains domains.txt \
            --openssl ~/openssl-ech/bin/openssl \
            --concurrency ${{ github.event.inputs.concurrency || '20' }} \
            --timeout ${{ github.event.inputs.timeout || '5' }} \
            --output results/

      - name: 上传探测结果
        uses: actions/upload-artifact@v4
        with:
          name: ech-probe-results-${{ github.run_id }}
          path: results/
          retention-days: 30

      - name: 打印结果摘要
        run: |
          if [ -f results/summary.txt ]; then
            cat results/summary.txt
          fi
          # 写入 GitHub Actions Job Summary
          echo "## ECH 探测结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/summary.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat results/summary.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "详细结果见 Artifacts: \`ech-probe-results-${{ github.run_id }}\`" \
            >> $GITHUB_STEP_SUMMARY
